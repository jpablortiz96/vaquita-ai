[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
auto_detect_remappings = true
verbosity = 2
gas_reports = ["*"]
fs_permissions = [{ access = "read", path = "./" }]

[profile.ci]
verbosity = 4
fuzz = { runs = 1000 }

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
multiline_func_header = "all"
number_underscore = "thousands"
quote_style = "double"
tab_width = 4
wrap_comments = true

[rpc_endpoints]
arbitrum_one = "${ARBITRUM_ONE_RPC}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"

[etherscan]
arbitrum_one = { key = "${ARBISCAN_API_KEY}", chain = 42161 }
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614 }
